      /* Critical CSS for initial render */
      * {

      }
      
      /* Loading animation */
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
      }
      
      .loader {
        width: 60px;
        height: 60px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top: 3px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide loading when app is ready */
      .loading-container.hide {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }
    </style>

      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');

    <!-- Remove loading screen after app loads -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingContainer = document.getElementById('loading-container');
          if (loadingContainer) {
            loadingContainer.classList.add('hide');
            setTimeout(() => {
              if (loadingContainer.parentNode) {
                loadingContainer.style.display = 'none';
              }
            }, 300);
          }
        }, 500);
      });
      
      // Service Worker Registration for PWA
      if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.hostname === 'localhost')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service_worker.js')
            .then((registration) => {
              console.log('✅ ServiceWorker registered successfully:', registration.scope);
            })
            .catch((error) => {
              console.error('❌ ServiceWorker registration failed:', error);
            });
        });
      }
      
      // Before Install Prompt handling for PWA
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('📱 PWA install prompt available');
        
        // Dispatch custom event for React to listen to
        window.dispatchEvent(new CustomEvent('pwa-install-ready', { detail: { deferredPrompt: e } }));
      });
      
      // Handle offline status
      window.addEventListener('online', () => {
        console.log('🟢 App is online');
        window.dispatchEvent(new CustomEvent('app-online'));
      });
      
      window.addEventListener('offline', () => {
        console.log('🔴 App is offline');
        window.dispatchEvent(new CustomEvent('app-offline'));
      });
    </script>
