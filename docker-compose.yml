version: '3.8'

services:
  # ============================================
  # DATABASE - MariaDB (Centralized)
  # ============================================
  mariadb:
    image: mariadb:10.11
    container_name: restpoint_db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MARIADB_DATABASE: restpoint_system
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - restpoint_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # CACHE - Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: restpoint_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - restpoint_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================
  # RESTPOINT GATEWAY
  # ============================================
  restpoint-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: restpoint_gateway
    ports:
      - "${API_GATEWAY_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - SERVICE_NAME=restpoint-gateway
      - PORT=5000
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    networks:
      - restpoint_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # AUTH SERVICE
  # ============================================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: restpoint_auth
    ports:
      - "${AUTH_SERVICE_PORT:-5001}:5001"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    networks:
      - restpoint_net
    restart: unless-stopped

  # ============================================
  # TENANT SERVICE
